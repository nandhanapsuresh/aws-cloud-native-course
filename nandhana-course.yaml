apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cloudstudents
  name: deployment-2048-nandhana
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: app-2048-nandhana
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-2048-nandhana
    spec:
      containers:
        - image: 991524241826.dkr.ecr.ap-south-2.amazonaws.com/nandhana-course-app:final
          imagePullPolicy: Always
          name: app-2048-nandhana
          ports:
            - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  namespace: cloudstudents
  name: service-2048-nandhana
spec:
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
  type: NodePort
  selector:
    app.kubernetes.io/name: app-2048-nandhana
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: cloudstudents
  name: ingress-2048-nandhana
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: service-2048-nandhana
                port:
                  number: 3001
